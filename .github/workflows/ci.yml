name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter='./packages/core' build && bun run --filter='./packages/cli' build

      - name: Run tests
        run: bun run --filter='./packages/*' test

      - name: Smoke test — generate example
        run: node packages/cli/dist/index.cjs generate --cwd apps/example

  release:
    name: Tag & publish
    needs: test
    # Only run on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can inspect all tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Build packages
        if: steps.tag_check.outputs.exists == 'false'
        run: bun run --filter='./packages/core' build && bun run --filter='./packages/cli' build

      - name: Authenticate with npm
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: packages/cli

      - name: Push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
