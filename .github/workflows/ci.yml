name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter='./packages/core' build && bun run --filter='./packages/cli' build

      - name: Run tests
        run: bun run --filter='./packages/*' test

      - name: Smoke test — generate example
        run: node packages/cli/dist/index.js generate --cwd apps/example
